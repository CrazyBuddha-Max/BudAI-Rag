version: "3.8"
services:
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: es-local
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - "xpack.security.enabled=false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          memory: 2g
    ports:
      - 9200:9200
